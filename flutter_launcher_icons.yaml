# flutter pub run flutter_launcher_icons
flutter_launcher_icons:
  image_path: fastlane/metadata/android/en-US/images/icon.png

  android: "launcher_icon"
  min_sdk_android: 21 # android min sdk min:16, default 21
  # Adaptive icon layers are managed manually in mipmap-anydpi-v26/ic_launcher.xml.
  # The manifest uses @mipmap/ic_launcher (not launcher_icon) for adaptive + themed icon support.
  # ic_launcher_background color: #1A1A2E (res/values/ic_launcher_background.xml)
  # ic_launcher_foreground: mipmap-*/ic_launcher_foreground.webp
  # monochrome: same foreground layer, tinted by system on Android 13+ (API 33)

  ios: true
  # image_path_ios: "assets/icon/icon.png"
  remove_alpha_channel_ios: true
  # image_path_ios_dark_transparent: "assets/icon/icon_dark.png"
  # image_path_ios_tinted_grayscale: "assets/icon/icon_tinted.png"
  # desaturate_tinted_to_grayscale_ios: true

  web:
    generate: true
    image_path: "assets/meditation.png"
    # background_color: "#hexcode"
    # theme_color: "#hexcode"

  windows:
    generate: true
    image_path: "assets/meditation.png"
    icon_size: 48 # min:48, max:256, default: 48

  macos:
    generate: true
    image_path: "assets/meditation.png"
